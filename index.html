<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>消消乐 · 学英语</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="消消乐学英语">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="theme-color" content="#1a1a2e">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
@viewport{width:device-width;zoom:1;max-zoom:1;min-zoom:1;user-zoom:fixed;}
body{
  background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);
  min-height:100vh;min-height:-webkit-fill-available;
  display:flex;justify-content:center;align-items:center;
  font-family:'Microsoft YaHei','PingFang SC',sans-serif;
  touch-action:manipulation;-webkit-tap-highlight-color:transparent;
}
.game-wrap{
  background:rgba(255,255,255,0.05);border-radius:20px;padding:14px;
  border:2px solid rgba(255,255,255,0.1);text-align:center;
  width:100%;max-width:500px;margin:8px;
}
h1{color:#ffd700;font-size:24px;margin-bottom:4px;}
.sub{color:#aaa;font-size:12px;margin-bottom:8px;}
.level-select{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;margin:8px 0;}
.lv-card{
  width:68px;padding:8px 4px;border-radius:10px;cursor:pointer;
  border:2px solid rgba(255,255,255,0.2);text-align:center;transition:all 0.15s;
  background:rgba(255,255,255,0.05);color:#fff;
}
.lv-card:active{transform:scale(0.95);border-color:#ffd700;}
.lv-card .lv-num{font-size:20px;font-weight:bold;color:#ffd700;}
.lv-card .lv-tag{font-size:9px;color:#aaa;margin:1px 0;}
.lv-card .lv-target{font-size:8px;color:#8b949e;}
.lv-card.locked{opacity:0.35;pointer-events:none;}
.lv-card.completed{border-color:#2ecc71;background:rgba(46,204,113,0.1);}
.lv-card.completed .lv-num{color:#2ecc71;}
.lv-card.completed::after{content:'✅';font-size:10px;display:block;}

.game-view{display:none;}
.level-bar{
  display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:6px;
  background:rgba(255,215,0,0.08);padding:5px 12px;border-radius:16px;font-size:13px;
}
.level-bar .lv{color:#ffd700;font-weight:bold;}
.lv-tag{font-size:9px;padding:1px 6px;border-radius:8px;font-weight:bold;}
.tag-fruit{background:rgba(46,204,113,0.3);color:#2ecc71;}
.tag-furniture{background:rgba(155,89,182,0.3);color:#bb86fc;}
.progress-wrap{flex:1;max-width:160px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,#f39c12,#ffd700);transition:width 0.3s;border-radius:3px;}
.score-bar{display:flex;justify-content:center;gap:12px;margin-bottom:6px;flex-wrap:wrap;}
.score-item{background:rgba(255,255,255,0.08);padding:4px 10px;border-radius:8px;color:#fff;}
.score-item .num{font-size:18px;font-weight:bold;color:#ffd700;}
.score-item .lbl{font-size:9px;color:#aaa;}

.grid{display:grid;grid-template-columns:repeat(8,1fr);grid-template-rows:repeat(8,1fr);
  gap:2px;padding:8px;background:rgba(0,0,0,0.2);border-radius:14px;aspect-ratio:1;
  user-select:none;-webkit-user-select:none;}
.cell{
  aspect-ratio:1;border-radius:8px;display:flex;
  flex-direction:column;align-items:center;justify-content:center;
  cursor:pointer;transition:transform 0.1s;
  font-size:clamp(16px,4vw,24px);border:2px solid rgba(255,255,255,0.3);
  min-width:0;overflow:hidden;
}
.cell .word{font-size:clamp(6px,1.2vw,8px);color:rgba(255,255,255,0.9);
  text-shadow:0 1px 2px rgba(0,0,0,0.5);white-space:nowrap;line-height:1;}
.cell:active{transform:scale(0.92);}
.cell.selected{transform:scale(1.08);box-shadow:0 0 16px rgba(255,255,255,0.6);border-color:#fff !important;z-index:2;}
.cell.matched{animation:pop 0.35s ease-out forwards;}
@keyframes pop{0%{transform:scale(1);opacity:1;}50%{transform:scale(1.3);opacity:0.7;}100%{transform:scale(0);opacity:0;}}
.cell.fall{animation:fall 0.25s ease-in;}
@keyframes fall{0%{transform:translateY(-60px);opacity:0.3;}100%{transform:translateY(0);opacity:1;}}
.msg{color:#ffd700;font-size:13px;min-height:20px;margin-top:6px;}
.btn-row{display:flex;justify-content:center;gap:6px;margin-top:4px;flex-wrap:wrap;}
.btn{background:#ff6b6b;color:#fff;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;}
.btn:active{background:#c0392b;}
.btn.green{background:#27ae60;}
.btn.green:active{background:#1e8449;}
.level-complete{
  display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:#161b22;border:2px solid #ffd700;border-radius:16px;padding:24px 32px;
  text-align:center;z-index:100;box-shadow:0 0 40px rgba(255,215,0,0.3);
}
.level-complete h2{color:#ffd700;font-size:28px;margin-bottom:6px;}
.level-complete p{color:#c9d1d9;margin-bottom:12px;font-size:14px;}
</style>
</head>
<body>

<div class="game-wrap">
  <h1 id="mainTitle">🍎 消消乐 · 学英语</h1>
  <p class="sub" id="subTitle">选一关开始吧！</p>
  <div class="level-select" id="levelSelect"></div>

  <div class="game-view" id="gameView">
    <div class="level-bar">
      <span class="lv" id="levelLabel">第 1 关</span>
      <span class="lv-tag tag-fruit" id="levelTag">水果</span>
      <div class="progress-wrap"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
      <span style="color:#aaa;font-size:11px;" id="progressText">0/800</span>
    </div>
    <div class="score-bar">
      <div class="score-item"><div class="num" id="score">0</div><div class="lbl">得分</div></div>
      <div class="score-item"><div class="num" id="combo">0</div><div class="lbl">连击</div></div>
      <div class="score-item"><div class="num" id="words">0</div><div class="lbl">单词</div></div>
    </div>
    <div class="grid" id="grid"></div>
    <div class="msg" id="msg"></div>
    <div class="btn-row">
      <button class="btn" onclick="backToMenu()">📋 选关</button>
      <button class="btn green" onclick="restartLevel()">🔄 重来</button>
    </div>
  </div>
</div>

<div class="level-complete" id="levelComplete">
  <h2 id="completeTitle">🎉 通关！</h2>
  <p id="completeMsg"></p>
  <button class="btn green" onclick="nextLevel()">▶ 下一关</button>
  <button class="btn" onclick="backToMenu()" style="margin-left:6px;">📋 选关</button>
</div>

<script>
const ROWS=8, COLS=8;
const TARGET_SCORES=[800,1000,1200,1500,1800,2000,2300,2600,3000,3500];

const FRUIT_POOL=[
  {emoji:'🍎',word:'Apple',color:'#e74c3c'},{emoji:'🍌',word:'Banana',color:'#f1c40f'},
  {emoji:'🍇',word:'Grape',color:'#9b59b6'},{emoji:'🍊',word:'Orange',color:'#e67e22'},
  {emoji:'🍓',word:'Strawberry',color:'#e91e63'},{emoji:'🍉',word:'Watermelon',color:'#2ecc71'},
  {emoji:'🍑',word:'Peach',color:'#fd79a8'},{emoji:'🫐',word:'Blueberry',color:'#3498db'},
  {emoji:'🍒',word:'Cherry',color:'#c0392b'},{emoji:'🥭',word:'Mango',color:'#f39c12'},
  {emoji:'🥝',word:'Kiwi',color:'#27ae60'},{emoji:'🍋',word:'Lemon',color:'#f9e74a'},
  {emoji:'🍍',word:'Pineapple',color:'#d4a017'},{emoji:'🍐',word:'Pear',color:'#a8d870'},
];

const FURNITURE_POOL=[
  {emoji:'🪑',word:'Chair',color:'#8d6e63'},{emoji:'🛏️',word:'Bed',color:'#5c6bc0'},
  {emoji:'🛋️',word:'Sofa',color:'#ef5350'},{emoji:'📦',word:'Table',color:'#66bb6a'},
  {emoji:'🪟',word:'Window',color:'#42a5f5'},{emoji:'🚪',word:'Door',color:'#8d6e63'},
  {emoji:'💡',word:'Lamp',color:'#ffca28'},{emoji:'🪞',word:'Mirror',color:'#78909c'},
  {emoji:'📚',word:'Bookshelf',color:'#8d6e63'},{emoji:'🧊',word:'Fridge',color:'#b0bec5'},
  {emoji:'📺',word:'TV',color:'#37474f'},{emoji:'🛁',word:'Bathtub',color:'#4fc3f7'},
  {emoji:'🕰️',word:'Clock',color:'#a1887f'},{emoji:'🖼️',word:'Picture',color:'#f48fb1'},
];

function buildLevels(){
  const ls=[],fp=[...FRUIT_POOL],furp=[...FURNITURE_POOL];
  shuffleArray(fp);shuffleArray(furp);
  for(let i=0;i<5;i++)ls.push({num:i+1,cat:'fruit',tag:'🍎 水果',tc:'tag-fruit',items:fp.slice(i*7,i*7+7),target:TARGET_SCORES[i]});
  for(let i=0;i<5;i++)ls.push({num:i+6,cat:'furniture',tag:'🪑 家具',tc:'tag-furniture',items:furp.slice(i*7,i*7+7),target:TARGET_SCORES[i+5]});
  return ls;
}

let levels,ci,cl,items,grid=[],sel=null,score=0,combo=0,wl=0,ws=new Set(),anim=false,comp=new Set(),lvlDone=false;

const synth=window.speechSynthesis;
function speak(w,r=0.4){synth.cancel();const u=new SpeechSynthesisUtterance(w);u.lang='en-US';u.rate=r;u.pitch=1.1;const vs=synth.getVoices();const us=vs.find(v=>v.lang==='en-US')||vs.find(v=>v.lang.startsWith('en'));if(us)u.voice=us;synth.speak(u);}

function buildSelect(){
  const el=document.getElementById('levelSelect');el.innerHTML='';
  for(let i=0;i<levels.length;i++){
    const l=levels[i],d=document.createElement('div');
    d.className='lv-card';if(i>0&&!comp.has(i-1))d.classList.add('locked');
    if(comp.has(i))d.classList.add('completed');
    d.innerHTML=`<div class="lv-num">${l.num}</div><div class="lv-tag">${l.tag}</div><div class="lv-target">${l.target}分</div>`;
    d.onclick=()=>{if(!d.classList.contains('locked'))start(i);};
    el.appendChild(d);
  }
}

function start(i){ci=i;cl=levels[i];items=cl.items;score=0;combo=0;wl=0;ws=new Set();sel=null;anim=false;lvlDone=false;
  updateScores();document.getElementById('levelSelect').style.display='none';
  document.getElementById('gameView').style.display='block';
  document.getElementById('mainTitle').style.display='none';
  document.getElementById('subTitle').style.display='none';
  updateLevelUI();initGrid();render();
  document.getElementById('msg').textContent=`第${cl.num}关 · ${cl.tag} · 目标${cl.target}分！`;}

function back(){synth.cancel();document.getElementById('gameView').style.display='none';
  document.getElementById('levelComplete').style.display='none';
  document.getElementById('mainTitle').style.display='block';
  document.getElementById('subTitle').style.display='block';
  document.getElementById('levelSelect').style.display='flex';buildSelect();}

function rest(){start(ci);}
function updateLevelUI(){document.getElementById('levelLabel').textContent=`第 ${cl.num} 关`;
  const t=document.getElementById('levelTag');t.textContent=cl.tag;t.className='lv-tag '+cl.tc;updateProgress();}
function updateProgress(){const p=Math.min(100,Math.floor(score/cl.target*100));
  document.getElementById('progressFill').style.width=p+'%';
  document.getElementById('progressText').textContent=`${score}/${cl.target}`;}
function checkDone(){if(score>=cl.target&&!lvlDone){lvlDone=true;comp.add(ci);}}
function showLevelComplete(){document.getElementById('levelComplete').style.display='block';
  if(ci>=9){document.getElementById('completeTitle').textContent='🏆 全部通关！';document.getElementById('completeMsg').textContent=`太棒了！学会了 ${wl} 个单词！`;}
  else{document.getElementById('completeTitle').textContent='🎉 通关！';document.getElementById('completeMsg').textContent=`第 ${cl.num} 关完成！\n下一关目标：${levels[ci+1].target} 分`;}}
function nextLv(){document.getElementById('levelComplete').style.display='none';if(ci<9)start(ci+1);else back();}

function ri(){return Math.floor(Math.random()*items.length);}
function initGrid(){grid=[];for(let r=0;r<ROWS;r++){grid[r]=[];for(let c=0;c<COLS;c++){let f;do{f=ri();}while((r>=2&&grid[r-1][c]===f&&grid[r-2][c]===f)||(c>=2&&grid[r][c-1]===f&&grid[r][c-2]===f));grid[r][c]=f;}}}
function render(){const el=document.getElementById('grid');el.innerHTML='';for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){const f=items[grid[r][c]],d=document.createElement('div');d.className='cell';d.style.background=f.color;d.innerHTML=`${f.emoji}<span class="word">${f.word}</span>`;d.dataset.row=r;d.dataset.col=c;d.onclick=()=>ck(r,c);el.appendChild(d);}}
function uc(r,c){const el=gc(r,c);if(!el)return;const f=items[grid[r][c]];el.style.background=f.color;el.innerHTML=`${f.emoji}<span class="word">${f.word}</span>`;el.className='cell fall';}
function gc(r,c){return document.querySelector(`[data-row="${r}"][data-col="${c}"]`);}

function ck(r,c){if(anim)return;
  if(sel===null){sel={r,c};gc(r,c)?.classList.add('selected');document.getElementById('msg').textContent=`${items[grid[r][c]].word}！点旁边的 →`;}
  else{const sr=sel.r,sc=sel.c;gc(sr,sc)?.classList.remove('selected');
    if(Math.abs(sr-r)+Math.abs(sc-c)===1)trySwap(sr,sc,r,c);
    else document.getElementById('msg').textContent='要点相邻的哦！';sel=null;}}

async function trySwap(r1,c1,r2,c2){anim=true;[grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];uc(r1,c1);uc(r2,c2);await sl(200);const m=findM();if(m.size===0){[grid[r1][c1],grid[r2][c2]]=[grid[r2][c2],grid[r1][c1]];uc(r1,c1);uc(r2,c2);document.getElementById('msg').textContent='没有匹配！再试试~';anim=false;return;}combo=0;await proc(m);anim=false;if(lvlDone){showLevelComplete();}}

function findM(){const m=new Set();for(let r=0;r<ROWS;r++)for(let c=0;c<COLS-2;c++)if(grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2]){m.add(`${r},${c}`);m.add(`${r},${c+1}`);m.add(`${r},${c+2}`);}for(let c=0;c<COLS;c++)for(let r=0;r<ROWS-2;r++)if(grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c]){m.add(`${r},${c}`);m.add(`${r+1},${c}`);m.add(`${r+2},${c}`);}return m;}

async function proc(m){combo++;const cw=new Set();for(const k of m){const [r,c]=k.split(',').map(Number);gc(r,c)?.classList.add('matched');cw.add(items[grid[r][c]].word);ws.add(items[grid[r][c]].word);}
  const wa=[...cw];for(let i=0;i<wa.length;i++){document.getElementById('msg').textContent=`🔊 ${wa[i]}！`;speak(wa[i]);await sl(700);}
  score+=m.size*10*combo;wl=ws.size;updateScores();updateProgress();document.getElementById('msg').textContent=`+${m.size*10*combo} 分！${wa.join(', ')}`;
  checkDone();await sl(200);for(const k of m){const [r,c]=k.split(',').map(Number);grid[r][c]=-1;}
  for(let c=0;c<COLS;c++){let wr=ROWS-1;for(let r=ROWS-1;r>=0;r--){if(grid[r][c]!==-1){grid[wr][c]=grid[r][c];if(wr!==r)grid[r][c]=-1;wr--;}}for(let r=wr;r>=0;r--)grid[r][c]=ri();}
  render();await sl(300);const ch=findM();if(ch.size>0)await proc(ch);}

function updateScores(){document.getElementById('score').textContent=score;document.getElementById('combo').textContent=combo;document.getElementById('words').textContent=wl;}
function shuffleArray(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}}
function sl(ms){return new Promise(r=>setTimeout(r,ms));}

speechSynthesis.onvoiceschanged=()=>{};speechSynthesis.getVoices();

// Register Service Worker for offline PWA
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js');
}

levels=buildLevels();buildSelect();
</script>
</body>
</html>
